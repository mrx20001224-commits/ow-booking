<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OW陪玩 - 后台控制台</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.2.0/lunar.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(180deg, #0d1117 0%, #010409 100%);
            min-height: 100vh; 
            color: #fff;
        }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(22, 27, 34, 0.9) 0%, rgba(13, 17, 23, 0.95) 100%);
            border: 1px solid rgba(48, 54, 61, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        .status-btn {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .status-btn.active {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        }
        
        .status-online {
            background: linear-gradient(135deg, rgba(35, 197, 94, 0.3) 0%, rgba(22, 27, 34, 0.9) 100%);
            border: 2px solid rgba(35, 197, 94, 0.6);
        }
        .status-online.active {
            box-shadow: 0 0 40px rgba(35, 197, 94, 0.4);
        }
        
        .status-busy {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.3) 0%, rgba(22, 27, 34, 0.9) 100%);
            border: 2px solid rgba(239, 68, 68, 0.6);
        }
        .status-busy.active {
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.4);
        }
        
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .calendar-day:hover { background: rgba(255, 255, 255, 0.1); }
        .calendar-day.selected {
            background: rgba(59, 130, 246, 0.3);
            border: 2px solid rgba(59, 130, 246, 0.6);
        }
        .calendar-day .lunar {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 1px;
        }
        
        .time-slot {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(48, 54, 61, 0.6);
            background: rgba(22, 27, 34, 0.6);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }
        .time-slot:hover { background: rgba(255, 255, 255, 0.05); }
        .time-slot.available {
            background: rgba(35, 197, 94, 0.2);
            border-color: rgba(35, 197, 94, 0.5);
            color: #4ade80;
        }
        .time-slot.busy {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
            color: #f87171;
        }
        
        .save-btn {
            background: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }
        
        .sync-indicator {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 6px 12px;
            background: rgba(35, 197, 94, 0.2);
            border: 1px solid rgba(35, 197, 94, 0.4);
            border-radius: 20px;
            font-size: 11px;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 50;
        }
        .sync-indicator.syncing {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.4);
            color: #60a5fa;
        }
        .sync-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(35, 197, 94, 0.95);
            color: black;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        input, textarea {
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid rgba(48, 54, 61, 0.6);
            border-radius: 8px;
            padding: 10px 12px;
            color: white;
            font-size: 14px;
            width: 100%;
            outline: none;
            transition: all 0.3s;
        }
        input:focus, textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // 农历工具
        const getLunarDate = (year, month, day) => {
            try {
                if (typeof Lunar !== 'undefined') {
                    const lunar = Lunar.fromYmd(year, month, day);
                    const dayName = lunar.getDayInChinese();
                    if (dayName === '初一') return lunar.getMonthInChinese() + '月';
                    return dayName;
                }
            } catch (e) {}
            return '';
        };
        
        // 同步指示器
        function SyncIndicator({ isConnected, isSyncing }) {
            return (
                <div className={`sync-indicator ${isSyncing ? 'syncing' : ''}`}>
                    <span className="sync-dot"></span>
                    {isSyncing ? '同步中...' : isConnected ? '已连接' : '离线'}
                </div>
            );
        }
        
        // 状态切换
        function StatusControl({ status, onChange }) {
            return (
                <div className="glass-card rounded-2xl p-5 mb-4">
                    <h2 className="text-white font-semibold mb-4 flex items-center gap-2">
                        <span className="w-1 h-4 bg-blue-500 rounded-full"></span>
                        当前状态
                    </h2>
                    
                    <div className="space-y-3">
                        <button
                            onClick={() => onChange('online')}
                            className={`status-btn w-full p-4 rounded-xl flex items-center gap-4 ${status === 'online' ? 'active status-online' : 'bg-white/5'}`}
                        >
                            <div className={`w-4 h-4 rounded-full ${status === 'online' ? 'bg-green-400 animate-pulse' : 'bg-white/30'}`}></div>
                            <div className="text-left flex-1">
                                <div className={`font-semibold ${status === 'online' ? 'text-green-400' : 'text-white'}`}>Online</div>
                                <div className="text-sm text-white/50">空闲，可接单</div>
                            </div>
                            {status === 'online' && (
                                <svg className="w-6 h-6 text-green-400" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                                </svg>
                            )}
                        </button>
                        
                        <button
                            onClick={() => onChange('busy')}
                            className={`status-btn w-full p-4 rounded-xl flex items-center gap-4 ${status === 'busy' ? 'active status-busy' : 'bg-white/5'}`}
                        >
                            <div className={`w-4 h-4 rounded-full ${status === 'busy' ? 'bg-red-400 animate-pulse' : 'bg-white/30'}`}></div>
                            <div className="text-left flex-1">
                                <div className={`font-semibold ${status === 'busy' ? 'text-red-400' : 'text-white'}`}>Busy</div>
                                <div className="text-sm text-white/50">忙碌，暂停接单</div>
                            </div>
                            {status === 'busy' && (
                                <svg className="w-6 h-6 text-red-400" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                                </svg>
                            )}
                        </button>
                    </div>
                </div>
            );
        }
        
        // 心情编辑
        function MoodControl({ mood, onChange }) {
            return (
                <div className="glass-card rounded-2xl p-5 mb-4">
                    <h2 className="text-white font-semibold mb-4 flex items-center gap-2">
                        <span className="w-1 h-4 bg-blue-500 rounded-full"></span>
                        实时心情
                    </h2>
                    <input
                        type="text"
                        value={mood}
                        onChange={(e) => onChange(e.target.value)}
                        placeholder="例如：手感爆热，带飞！"
                        maxLength={30}
                    />
                </div>
            );
        }
        
        // 日历管理
        function CalendarControl({ bookings, onUpdateBooking }) {
            const [viewDate, setViewDate] = useState(new Date());
            const [selectedDay, setSelectedDay] = useState(null);
            
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const days = [];
            for (let i = 0; i < firstDay; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(i);
            
            const timeSlots = [
                '10:00-12:00', '12:00-14:00', '14:00-16:00', 
                '16:00-18:00', '18:00-20:00', '20:00-22:00'
            ];
            
            const getDayBookings = (day) => {
                if (!day) return [];
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                return bookings.filter(b => b.date === dateStr);
            };
            
            const toggleTimeSlot = (day, time) => {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const existing = bookings.find(b => b.date === dateStr && b.time_slot === time);
                
                if (existing) {
                    onUpdateBooking(bookings.filter(b => !(b.date === dateStr && b.time_slot === time)));
                } else {
                    onUpdateBooking([...bookings, { date: dateStr, time_slot: time, status: 'available' }]);
                }
            };
            
            const markAsBusy = (day, time) => {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const existing = bookings.find(b => b.date === dateStr && b.time_slot === time);
                
                if (existing) {
                    onUpdateBooking(bookings.map(b => 
                        b.date === dateStr && b.time_slot === time 
                            ? { ...b, status: b.status === 'busy' ? 'available' : 'busy' }
                            : b
                    ));
                } else {
                    onUpdateBooking([...bookings, { date: dateStr, time_slot: time, status: 'busy' }]);
                }
            };
            
            return (
                <div className="glass-card rounded-2xl p-5 mb-4">
                    <div className="flex items-center justify-between mb-4">
                        <h2 className="text-white font-semibold flex items-center gap-2">
                            <span className="w-1 h-4 bg-blue-500 rounded-full"></span>
                            预约管理
                        </h2>
                        <div className="flex gap-2">
                            <button 
                                onClick={() => setViewDate(new Date(year, month - 1, 1))}
                                className="w-8 h-8 flex items-center justify-center rounded-lg bg-white/5 text-white/60 hover:text-white"
                            >&lt;</button>
                            <span className="text-white/80">{year}年{month + 1}月</span>
                            <button 
                                onClick={() => setViewDate(new Date(year, month + 1, 1))}
                                className="w-8 h-8 flex items-center justify-center rounded-lg bg-white/5 text-white/60 hover:text-white"
                            >&gt;</button>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-7 gap-1 mb-2">
                        {['日','一','二','三','四','五','六'].map(d => (
                            <div key={d} className="text-center text-white/40 text-xs py-2">{d}</div>
                        ))}
                    </div>
                    
                    <div className="grid grid-cols-7 gap-1 mb-4">
                        {days.map((day, idx) => {
                            if (!day) return <div key={idx} className="calendar-day"></div>;
                            const dayBookings = getDayBookings(day);
                            const hasAvailable = dayBookings.some(b => b.status === 'available');
                            const hasBusy = dayBookings.some(b => b.status === 'busy');
                            
                            return (
                                <div 
                                    key={day}
                                    className={`calendar-day ${selectedDay === day ? 'selected' : ''} ${hasAvailable ? 'text-green-400' : ''} ${hasBusy ? 'text-red-400' : ''}`}
                                    onClick={() => setSelectedDay(selectedDay === day ? null : day)}
                                >
                                    <span>{day}</span>
                                    <span className="lunar">{getLunarDate(year, month + 1, day)}</span>
                                    {dayBookings.length > 0 && (
                                        <div className="absolute bottom-1 flex gap-0.5">
                                            {hasAvailable && <div className="w-1 h-1 rounded-full bg-green-400"></div>}
                                            {hasBusy && <div className="w-1 h-1 rounded-full bg-red-400"></div>}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    
                    {selectedDay && (
                        <div className="border-t border-white/10 pt-4">
                            <p className="text-white/60 text-sm mb-3">
                                {month + 1}月{selectedDay}日 时段设置
                                <span className="text-white/40 text-xs ml-2">点击切换状态</span>
                            </p>
                            <div className="grid grid-cols-2 gap-2">
                                {timeSlots.map(time => {
                                    const dayBookings = getDayBookings(selectedDay);
                                    const booking = dayBookings.find(b => b.time_slot === time);
                                    const status = booking?.status || null;
                                    
                                    return (
                                        <button
                                            key={time}
                                            onClick={() => markAsBusy(selectedDay, time)}
                                            onLongPress={() => toggleTimeSlot(selectedDay, time)}
                                            className={`time-slot ${status === 'available' ? 'available' : ''} ${status === 'busy' ? 'busy' : ''}`}
                                        >
                                            {time}
                                            {status === 'available' && ' ✓'}
                                            {status === 'busy' && ' ✗'}
                                        </button>
                                    );
                                })}
                            </div>
                            <p className="text-white/40 text-xs mt-2">绿色=可预约 | 红色=已约满 | 灰色=未设置</p>
                        </div>
                    )}
                </div>
            );
        }
        
        // 主应用
        function AdminApp() {
            const [status, setStatus] = useState('online');
            const [mood, setMood] = useState('手感爆热，带飞！');
            const [bookings, setBookings] = useState([]);
            const [isConnected, setIsConnected] = useState(true);
            const [isSyncing, setIsSyncing] = useState(false);
            const [showToast, setShowToast] = useState(false);
            
            // 模拟从服务器加载数据
            useEffect(() => {
                const today = new Date();
                const mockBookings = [
                    { date: `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-15`, time_slot: '14:00-16:00', status: 'available' },
                    { date: `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-15`, time_slot: '19:00-21:00', status: 'available' },
                    { date: `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-16`, time_slot: '14:00-16:00', status: 'busy' },
                ];
                setBookings(mockBookings);
            }, []);
            
            const handleSave = () => {
                setIsSyncing(true);
                
                // 保存到 localStorage
                const dataToSave = {
                    status,
                    mood,
                    bookings: bookings,
                    updatedAt: new Date().toISOString()
                };
                localStorage.setItem('ow_booking_status', JSON.stringify(dataToSave));
                
                // 触发 storage 事件让其他标签页同步
                window.dispatchEvent(new StorageEvent('storage', {
                    key: 'ow_booking_status',
                    newValue: JSON.stringify(dataToSave)
                }));
                
                setTimeout(() => {
                    setIsSyncing(false);
                    setShowToast(true);
                    setTimeout(() => setShowToast(false), 2000);
                }, 500);
            };
            
            return (
                <div className="min-h-screen px-4 py-6 max-w-md mx-auto">
                    <SyncIndicator isConnected={isConnected} isSyncing={isSyncing} />
                    
                    <div className="flex items-center justify-between mb-6">
                        <div>
                            <h1 className="text-2xl font-bold text-white">后台控制台</h1>
                            <p className="text-white/40 text-sm mt-1">管理你的实时状态</p>
                        </div>
                        <a href="index.html" className="text-blue-400 text-sm hover:underline">查看前台 →</a>
                    </div>
                    
                    <StatusControl status={status} onChange={setStatus} />
                    <MoodControl mood={mood} onChange={setMood} />
                    <CalendarControl bookings={bookings} onUpdateBooking={setBookings} />
                    
                    <button
                        onClick={handleSave}
                        className="save-btn w-full py-4 rounded-xl text-white font-bold text-lg flex items-center justify-center gap-2"
                    >
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                        </svg>
                        保存并同步到所有用户
                    </button>
                    
                    <p className="text-center text-white/30 text-xs mt-4">
                        所有更改将实时同步给查看链接的老板们
                    </p>
                    
                    <div className={`toast ${showToast ? 'show' : ''}`}>
                        ✓ 已同步到所有用户
                    </div>
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />);
    </script>
</body>
</html>
