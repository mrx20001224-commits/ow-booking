<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OW陪玩 - 后台控制台</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #0d1117 0%, #010409 100%); min-height: 100vh; color: #fff; }
        .glass-card { background: linear-gradient(135deg, rgba(22, 27, 34, 0.9) 0%, rgba(13, 17, 23, 0.95) 100%); border: 1px solid rgba(48, 54, 61, 0.6); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .status-btn { transition: all 0.3s ease; }
        .status-btn.active { transform: scale(1.02); }
        .status-online { background: linear-gradient(135deg, rgba(35, 197, 94, 0.3) 0%, rgba(22, 27, 34, 0.9) 100%); border: 2px solid rgba(35, 197, 94, 0.6); }
        .status-busy { background: linear-gradient(135deg, rgba(239, 68, 68, 0.3) 0%, rgba(22, 27, 34, 0.9) 100%); border: 2px solid rgba(239, 68, 68, 0.6); }
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; font-size: 12px; cursor: pointer; transition: all 0.2s; background: rgba(255, 255, 255, 0.05); position: relative; }
        .calendar-day:hover { background: rgba(255, 255, 255, 0.1); }
        .calendar-day.selected { background: rgba(59, 130, 246, 0.3); border: 2px solid rgba(59, 130, 246, 0.6); }
        .calendar-day.has-slots { background: rgba(35, 197, 94, 0.15); border: 1px solid rgba(35, 197, 94, 0.4); }
        .calendar-day.has-bookings { background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.4); }
        .time-input { background: rgba(22, 27, 34, 0.8); border: 1px solid rgba(48, 54, 61, 0.6); border-radius: 8px; padding: 8px 12px; color: white; font-size: 14px; width: 80px; text-align: center; }
        .slot-tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(35, 197, 94, 0.2); border: 1px solid rgba(35, 197, 94, 0.4); border-radius: 20px; font-size: 13px; color: #4ade80; margin: 4px; }
        .slot-tag.locked { background: rgba(245, 158, 11, 0.2); border-color: rgba(245, 158, 11, 0.5); color: #fbbf24; }
        .save-btn { background: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4); }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(35, 197, 94, 0.95); color: black; padding: 12px 24px; border-radius: 50px; font-weight: 600; opacity: 0; transition: all 0.3s ease; z-index: 100; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        input { background: rgba(22, 27, 34, 0.8); border: 1px solid rgba(48, 54, 61, 0.6); border-radius: 8px; padding: 10px 12px; color: white; font-size: 14px; width: 100%; }
        .booking-item { background: rgba(35, 197, 94, 0.1); border: 1px solid rgba(35, 197, 94, 0.3); border-radius: 12px; padding: 12px; margin-bottom: 8px; }
        .booking-item.locked { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.4); }
        .lock-btn { padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; border: none; }
        .lock-btn.lock { background: rgba(245, 158, 11, 0.3); color: #fbbf24; }
        .lock-btn.unlock { background: rgba(35, 197, 94, 0.3); color: #4ade80; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const REPO = 'mrx20001224-commits/ow-booking';
        const FILE_PATH = 'v2/data.json';
        
        // 从 localStorage 读取 Token
        let GITHUB_TOKEN = localStorage.getItem('github_token');
        
        function AdminApp() {
            const [status, setStatus] = useState('online');
            const [mood, setMood] = useState('手感爆热，带飞！');
            const [slots, setSlots] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [viewDate, setViewDate] = useState(new Date());
            const [selectedDay, setSelectedDay] = useState(null);
            const [startTime, setStartTime] = useState('14');
            const [endTime, setEndTime] = useState('18');
            const [isLoading, setIsLoading] = useState(true);
            const [showToast, setShowToast] = useState(false);
            const [tokenInput, setTokenInput] = useState('');
            
            // 加载数据
            useEffect(() => {
                const loadData = async () => {
                    try {
                        const response = await fetch(`https://raw.githubusercontent.com/${REPO}/main/${FILE_PATH}?nocache=${Date.now()}`);
                        if (!response.ok) throw new Error('Network error');
                        const data = await response.json();
                        
                        setStatus(data.status || 'online');
                        setMood(data.mood || '手感爆热，带飞！');
                        setSlots(data.slots || []);
                        setBookings(data.bookings || []);
                        console.log('Loaded bookings:', data.bookings);
                    } catch (error) {
                        console.error('Load error:', error);
                    } finally {
                        setIsLoading(false);
                    }
                };
                
                loadData();
            }, []);
            
            // 保存 Token
            const saveToken = () => {
                if (tokenInput) {
                    localStorage.setItem('github_token', tokenInput);
                    GITHUB_TOKEN = tokenInput;
                    alert('Token 已保存');
                    window.location.reload();
                }
            };
            
            const year = viewDate.getFullYear(), month = viewDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const days = [];
            for (let i = 0; i < firstDay; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(i);
            
            const getDaySlots = (day) => {
                if (!day || !slots) return [];
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                return slots.filter(s => s.date === dateStr);
            };
            
            const getDayBookings = (day) => {
                if (!day || !bookings) return [];
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                return bookings.filter(b => b.slots && b.slots.some(s => s.date === dateStr));
            };
            
            const addSlot = () => {
                if (!selectedDay) { alert('请先选择日期'); return; }
                const start = parseInt(startTime), end = parseInt(endTime);
                if (start >= end) { alert('结束时间必须大于开始时间'); return; }
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(selectedDay).padStart(2, '0')}`;
                const newSlots = [];
                for (let i = start; i < end; i++) {
                    const timeStr = `${String(i).padStart(2, '0')}:00-${String(i + 1).padStart(2, '0')}:00`;
                    if (!slots.some(s => s.date === dateStr && s.time_slot === timeStr)) {
                        newSlots.push({ date: dateStr, time_slot: timeStr, is_available: true, locked: false });
                    }
                }
                setSlots([...slots, ...newSlots]);
            };
            
            const removeSlot = (slot) => { 
                setSlots(slots.filter(s => !(s.date === slot.date && s.time_slot === slot.time_slot))); 
            };
            
            const toggleLockSlot = (slot) => {
                setSlots(slots.map(s => {
                    if (s.date === slot.date && s.time_slot === slot.time_slot) {
                        return { ...s, locked: !s.locked };
                    }
                    return s;
                }));
            };
            
            const handleSave = async () => {
                if (!GITHUB_TOKEN) { alert('请先设置 GitHub Token'); return; }
                
                const data = { status, mood, slots, bookings, updated_at: new Date().toISOString() };
                
                try {
                    const metaRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, { 
                        headers: { Authorization: `token ${GITHUB_TOKEN}` }
                    });
                    const meta = await metaRes.json();
                    
                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
                    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`, {
                        method: 'PUT',
                        headers: { Authorization: `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: 'Update data', content, sha: meta.sha })
                    });
                    
                    if (res.ok) {
                        setShowToast(true);
                        setTimeout(() => setShowToast(false), 2000);
                    } else {
                        alert('保存失败');
                    }
                } catch (e) {
                    alert('保存失败：' + e.message);
                }
            };
            
            if (isLoading) return <div className="min-h-screen flex items-center justify-center text-white">加载中...</div>;
            
            return <div className="min-h-screen px-4 py-6 max-w-md mx-auto">
                {/* Token 设置 */}
                {!GITHUB_TOKEN && <div className="glass-card rounded-2xl p-5 mb-4"><h2 className="text-white font-semibold mb-3">设置 GitHub Token</h2><input type="password" placeholder="输入 GitHub Token" value={tokenInput} onChange={(e) => setTokenInput(e.target.value)} className="mb-3" /><button onClick={saveToken} className="w-full py-2 bg-blue-500 text-white rounded-lg">保存 Token</button></div>}
                
                <div className="flex items-center justify-between mb-6"><div><h1 className="text-2xl font-bold text-white">后台控制台</h1><p className="text-white/40 text-sm mt-1">管理你的实时状态</p></div><a href="index.html" className="text-blue-400 text-sm hover:underline">查看前台 →</a></div>
                
                {/* 状态切换 */}
                <div className="glass-card rounded-2xl p-5 mb-4"><h2 className="text-white font-semibold mb-4">当前状态</h2><div className="space-y-3"><button onClick={() => setStatus('online')} className={`status-btn w-full p-4 rounded-xl flex items-center gap-4 ${status === 'online' ? 'active status-online' : 'bg-white/5'}`}><div className={`w-4 h-4 rounded-full ${status === 'online' ? 'bg-green-400' : 'bg-white/30'}`}></div><div className="text-left flex-1"><div className={status === 'online' ? 'text-green-400 font-semibold' : 'text-white font-semibold'}>Online</div><div className="text-sm text-white/50">空闲，可接单</div></div>{status === 'online' && '✓'}</button><button onClick={() => setStatus('busy')} className={`status-btn w-full p-4 rounded-xl flex items-center gap-4 ${status === 'busy' ? 'active status-busy' : 'bg-white/5'}`}><div className={`w-4 h-4 rounded-full ${status === 'busy' ? 'bg-red-400' : 'bg-white/30'}`}></div><div className="text-left flex-1"><div className={status === 'busy' ? 'text-red-400 font-semibold' : 'text-white font-semibold'}>Busy</div><div className="text-sm text-white/50">忙碌，暂停接单</div></div>{status === 'busy' && '✓'}</button></div></div>
                
                {/* 心情 */}
                <div className="glass-card rounded-2xl p-5 mb-4"><h2 className="text-white font-semibold mb-4">实时心情</h2><input type="text" value={mood} onChange={(e) => setMood(e.target.value)} placeholder="例如：手感爆热，带飞！" maxLength={30} /></div>
                
                {/* 日历 */}
                <div className="glass-card rounded-2xl p-5 mb-4"><div className="flex items-center justify-between mb-4"><h2 className="text-white font-semibold">可预约时间管理</h2><div className="flex gap-2"><button onClick={() => setViewDate(new Date(year, month - 1, 1))} className="w-8 h-8 flex items-center justify-center rounded-lg bg-white/5 text-white/60">&lt;</button><span className="text-white/80">{year}年{month + 1}月</span><button onClick={() => setViewDate(new Date(year, month + 1, 1))} className="w-8 h-8 flex items-center justify-center rounded-lg bg-white/5 text-white/60">&gt;</button></div></div><div className="grid grid-cols-7 gap-1 mb-2">{['日','一','二','三','四','五','六'].map(d => <div key={d} className="text-center text-white/40 text-xs py-2">{d}</div>)}</div><div className="grid grid-cols-7 gap-1 mb-4">{days.map((day, idx) => { if (!day) return <div key={idx} className="calendar-day" style={{background:'transparent'}}></div>; const daySlots = getDaySlots(day); const dayBookings = getDayBookings(day); return <div key={day} className={`calendar-day ${selectedDay === day ? 'selected' : ''} ${daySlots.length > 0 ? 'has-slots' : ''} ${dayBookings.length > 0 ? 'has-bookings' : ''}`} onClick={() => setSelectedDay(selectedDay === day ? null : day)}><span>{day}</span>{(daySlots.length > 0 || dayBookings.length > 0) && <div className="absolute bottom-1 flex gap-0.5">{daySlots.length > 0 && <div className="w-1 h-1 rounded-full bg-green-400"></div>}{dayBookings.length > 0 && <div className="w-1 h-1 rounded-full bg-yellow-400"></div>}</div>}</div>; })}</div>{selectedDay && <div className="border-t border-white/10 pt-4"><p className="text-white font-medium mb-3">{year}-{String(month + 1).padStart(2, '0')}-{String(selectedDay).padStart(2, '0')} 时间段设置</p><div className="flex items-center gap-3 mb-4"><div className="flex items-center gap-2"><input type="number" min="0" max="23" value={startTime} onChange={(e) => setStartTime(e.target.value)} className="time-input" /><span className="text-white/60">:00</span></div><span className="text-white/40">至</span><div className="flex items-center gap-2"><input type="number" min="1" max="24" value={endTime} onChange={(e) => setEndTime(e.target.value)} className="time-input" /><span className="text-white/60">:00</span></div><button onClick={addSlot} className="px-4 py-2 bg-green-500/80 text-white rounded-lg text-sm">添加</button></div><div className="flex flex-wrap">{getDaySlots(selectedDay).length === 0 ? <p className="text-white/40 text-sm">该日期暂无可用时段</p> : getDaySlots(selectedDay).map((slot, idx) => <span key={idx} className={`slot-tag ${slot.locked ? 'locked' : ''}`}>{slot.time_slot}{slot.locked && ' 🔒'}<button onClick={() => toggleLockSlot(slot)} className="lock-btn ml-1">{slot.locked ? '解锁' : '锁定'}</button><button onClick={() => removeSlot(slot)} className="ml-1 text-red-400">×</button></span>)}</div></div>}</div>
                
                {/* 预约记录 */}
                <div className="glass-card rounded-2xl p-5 mb-4"><h2 className="text-white font-semibold mb-4">预约记录 ({bookings.length})</h2>{bookings.length === 0 ? <p className="text-white/40 text-sm">暂无预约</p> : <div className="space-y-2 max-h-80 overflow-y-auto">{bookings.map((booking, idx) => <div key={idx} className={`booking-item ${booking.locked ? 'locked' : ''}`}><div className="flex justify-between items-start"><div className="flex-1"><p className="text-white font-medium">{booking.customer_name || '匿名用户'}</p><p className="text-white/60 text-sm">{booking.customer_contact || '无联系方式'}</p><p className="text-blue-400 text-sm">{booking.price_rank} · {booking.price_amount}r/h</p><p className="text-white/40 text-xs mt-1">{booking.slots && booking.slots.map(s => `${s.date} ${s.time_slot}`).join(', ')}</p>{booking.notes && <p className="text-white/30 text-xs mt-1">备注: {booking.notes}</p>}</div><div className="flex flex-col gap-1"><span className={`px-2 py-0.5 rounded text-xs ${booking.status === 'pending' ? 'bg-yellow-500/20 text-yellow-400' : booking.status === 'confirmed' ? 'bg-green-500/20 text-green-400' : 'bg-gray-500/20 text-gray-400'}`}>{booking.status === 'pending' ? '待确认' : booking.status === 'confirmed' ? '已确认' : booking.status}</span>{booking.locked && <span className="px-2 py-0.5 rounded text-xs bg-yellow-500/20 text-yellow-400">🔒 已锁定</span>}</div></div></div>)}</div>}</div>
                
                <button onClick={handleSave} className="save-btn w-full py-4 rounded-xl text-white font-bold text-lg">保存并同步到所有用户</button>
                <div className={`toast ${showToast ? 'show' : ''}`}>✓ 已同步</div>
            </div>;
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />);
    </script>
</body>
</html>
