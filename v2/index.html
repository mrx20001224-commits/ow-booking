<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="守望先锋陪玩实时预约看板 - 专业电竞陪玩服务">
    <meta name="theme-color" content="#0a0a0f">
    
    <title>守望先锋 Overwatch - 技术&娱乐陪</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(180deg, #0d1117 0%, #010409 100%);
            min-height: 100vh; 
            color: #fff;
        }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(22, 27, 34, 0.9) 0%, rgba(13, 17, 23, 0.95) 100%);
            border: 1px solid rgba(48, 54, 61, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-up { opacity: 0; animation: fadeInUp 0.6s ease-out forwards; }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-500 { animation-delay: 0.5s; }
        
        .status-card-online {
            background: linear-gradient(135deg, rgba(35, 197, 94, 0.15) 0%, rgba(22, 27, 34, 0.9) 100%);
            border: 2px solid rgba(35, 197, 94, 0.5);
            box-shadow: 0 0 30px rgba(35, 197, 94, 0.2);
        }
        .status-card-busy {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(22, 27, 34, 0.9) 100%);
            border: 2px solid rgba(239, 68, 68, 0.5);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.2);
        }
        
        .price-tag {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
            border: 1px solid rgba(59, 130, 246, 0.4);
        }
        
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.05);
        }
        .calendar-day:hover { background: rgba(255, 255, 255, 0.1); }
        .calendar-day.available { background: rgba(35, 197, 94, 0.2); border: 1px solid rgba(35, 197, 94, 0.4); }
        .calendar-day.available .day-num { color: #4ade80; }
        .calendar-day .lunar { font-size: 9px; color: rgba(255, 255, 255, 0.4); margin-top: 1px; }
        
        .time-slot-btn {
            padding: 12px 8px;
            border-radius: 10px;
            border: 1px solid rgba(48, 54, 61, 0.6);
            background: rgba(22, 27, 34, 0.6);
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .time-slot-btn.available {
            background: rgba(35, 197, 94, 0.2);
            border-color: rgba(35, 197, 94, 0.5);
            color: #4ade80;
        }
        .time-slot-btn.selected {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }
        .time-slot-btn.multi-selected {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-color: #8b5cf6;
            color: white;
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .sync-indicator {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 6px 12px;
            background: rgba(35, 197, 94, 0.2);
            border: 1px solid rgba(35, 197, 94, 0.4);
            border-radius: 20px;
            font-size: 11px;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 50;
        }
        .sync-indicator.syncing {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.4);
            color: #60a5fa;
        }
        .sync-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .btn-primary {
            background: linear-gradient(90deg, #059669 0%, #10b981 50%, #059669 100%);
            background-size: 200% 100%;
            transition: all 0.3s ease;
        }
        .btn-primary:hover { background-position: 100% 0; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const mockData = {
            player: {
                name: "微信课索",
                avatar: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200&h=200&fit=crop",
                title: "国服挑战者 / 16年入坑老登 / 5千小时+",
                mood: "手感爆热，带飞！"
            },
            prices: [
                { id: 1, rank: "快速比赛", price: 25, icon: "⚡" },
                { id: 2, rank: "青铜白银黄金", price: 35, icon: "🥉", note: "(根据分数)" },
                { id: 3, rank: "角斗领域下三段", price: 45, icon: "⚔️" },
                { id: 4, rank: "白金段位", price: 55, icon: "💎" },
                { id: 5, rank: "钻石段位", price: 70, icon: "💎" },
                { id: 6, rank: "大师段位", price: 90, icon: "👑" },
            ],
        };
        
        function SyncIndicator({ isConnected, isSyncing }) {
            return (
                <div className={`sync-indicator ${isSyncing ? 'syncing' : ''}`}>
                    <span className="sync-dot"></span>
                    {isSyncing ? '同步中...' : isConnected ? '实时同步' : '本地模式'}
                </div>
            );
        }
        
        function Header({ mood }) {
            return (
                <div className="relative w-full h-48 overflow-hidden fade-in-up">
                    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800&h=400&fit=crop" alt="Overwatch" className="w-full h-full object-cover" />
                    <div className="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-[#0d1117]"></div>
                    <div className="absolute bottom-4 left-4 right-4">
                        <div className="glass-card rounded-xl p-4 flex items-center gap-3">
                            <img src={mockData.player.avatar} alt="avatar" className="w-14 h-14 rounded-full border-2 border-blue-500/50" />
                            <div className="flex-1">
                                <h1 className="text-white font-bold text-lg">【守望先锋 Overwatch】</h1>
                                <p className="text-blue-400 text-sm">技术&娱乐陪 🥣</p>
                                <p className="text-white/60 text-xs mt-0.5">{mockData.player.title}</p>
                                <p className="text-green-400 text-xs">今日心情: {mood}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        function StatusCard({ status }) {
            const isOnline = status === "online";
            return (
                <div className={`rounded-2xl p-5 mb-4 fade-in-up delay-100 ${isOnline ? 'status-card-online' : 'status-card-busy'}`}>
                    <div className="flex items-center justify-between mb-3">
                        <h2 className="text-white font-semibold flex items-center gap-2">
                            <span className="w-1 h-4 bg-blue-500 rounded-full"></span>
                            实时在线状态
                        </h2>
                        {isOnline && <span className="px-2 py-0.5 bg-green-500/20 text-green-400 text-xs rounded-full border border-green-500/30">秒回</span>}
                    </div>
                    <div className="text-center py-4">
                        <div className={`text-5xl font-bold mb-2 ${isOnline ? 'text-green-400' : 'text-red-400'}`}>{isOnline ? 'Online' : 'Busy'}</div>
                        <p className="text-white/60 text-sm">{isOnline ? '自定义后台控制，更新均实时同步' : '当前已被预约，请查看可预约时段'}</p>
                    </div>
                </div>
            );
        }
        
        function Calendar({ slots }) {
            const [viewDate, setViewDate] = useState(new Date());
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            const year = viewDate.getFullYear(), month = viewDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const days = [];
            for (let i = 0; i < firstDay; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(i);
            
            const hasSlots = (day) => {
                if (!day) return false;
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                return slots.some(s => s.date === dateStr);
            };
            
            return (
                <div className="glass-card rounded-2xl p-4 mb-4 fade-in-up delay-200">
                    <div className="flex items-center justify-between mb-4">
                        <h3 className="text-white font-semibold">{year}年{month + 1}月</h3>
                        <div className="flex gap-2">
                            <button onClick={() => setViewDate(new Date(year, month - 1, 1))} className="w-8 h-8 flex items-center justify-center rounded-lg bg-white/5 text-white/60 hover:text-white">&lt;</button>
                            <button onClick={() => setViewDate(new Date(year, month + 1, 1))} className="w-8 h-8 flex items-center justify-center rounded-lg bg-white/5 text-white/60 hover:text-white">&gt;</button>
                        </div>
                    </div>
                    <div className="grid grid-cols-7 gap-1 mb-2">
                        {weekDays.map(d => <div key={d} className="text-center text-white/40 text-xs py-2">{d}</div>)}
                    </div>
                    <div className="grid grid-cols-7 gap-1">
                        {days.map((day, idx) => {
                            if (!day) return <div key={idx} className="calendar-day" style={{background:'transparent'}}></div>;
                            const available = hasSlots(day);
                            return (
                                <div key={day} className={`calendar-day ${available ? 'available' : ''}`}>
                                    <span className="day-num">{day}</span>
                                    {available && <span className="text-[8px] text-green-400">可约</span>}
                                </div>
                            );
                        })}
                    </div>
                    <div className="flex items-center gap-4 mt-3 text-xs">
                        <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded bg-green-500/30 border border-green-500/50"></div><span className="text-white/60">有可用时段</span></div>
                    </div>
                </div>
            );
        }
        
        function PriceList({ onBook }) {
            return (
                <div className="mb-4 fade-in-up delay-300">
                    <h3 className="text-white font-semibold mb-3 flex items-center gap-2"><span className="w-1 h-4 bg-blue-500 rounded-full"></span>预约价格表单</h3>
                    <div className="space-y-2">
                        {mockData.prices.map((item) => (
                            <div key={item.id} className="price-tag rounded-xl p-3 flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <span className="text-lg">{item.icon}</span>
                                    <div><span className="text-white font-medium">{item.rank}</span>{item.note && <span className="text-white/40 text-xs ml-1">{item.note}</span>}</div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span className="text-white font-bold">{item.price}r/h</span>
                                    <button onClick={() => onBook(item)} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-500/80 text-white hover:bg-blue-500 transition-all">点此预约</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        
        // 预约弹窗 - 24小时制多选
        function BookingModal({ isOpen, onClose, selectedPrice, slots }) {
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedSlots, setSelectedSlots] = useState([]);
            const [viewDate, setViewDate] = useState(new Date());
            
            if (!isOpen || !selectedPrice) return null;
            
            const year = viewDate.getFullYear(), month = viewDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const days = [];
            for (let i = 0; i < firstDay; i++) days.push(null);
            for (let i = 1; i <= daysInMonth; i++) days.push(i);
            
            const getDateStr = (day) => `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            
            const getDaySlots = (day) => {
                if (!day) return [];
                return slots.filter(s => s.date === getDateStr(day));
            };
            
            const toggleSlot = (slot) => {
                const key = `${slot.date}_${slot.time_slot}`;
                if (selectedSlots.some(s => `${s.date}_${s.time_slot}` === key)) {
                    setSelectedSlots(selectedSlots.filter(s => `${s.date}_${s.time_slot}` !== key));
                } else {
                    setSelectedSlots([...selectedSlots, slot]);
                }
            };
            
            const handleConfirm = () => {
                if (selectedSlots.length === 0) {
                    alert('请至少选择一个时间段');
                    return;
                }
                const times = selectedSlots.map(s => s.time_slot).join(', ');
                alert(`预约成功！\n段位：${selectedPrice.rank}\n价格：${selectedPrice.price}r/h\n时间：${times}`);
                onClose();
                setSelectedDate(null);
                setSelectedSlots([]);
            };
            
            const daySlots = selectedDate ? getDaySlots(selectedDate) : [];
            
            return (
                <div className={`modal-overlay ${isOpen ? 'active' : ''}`} onClick={onClose}>
                    <div className="glass-card rounded-2xl p-5 max-w-sm w-full max-h-[85vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
                        <h3 className="text-white text-xl font-bold mb-1">预约：{selectedPrice.rank}</h3>
                        <p className="text-blue-400 text-sm mb-4">{selectedPrice.price}r/h · 可多选时间段</p>
                        
                        <div className="mb-4">
                            <div className="flex items-center justify-between mb-3">
                                <span className="text-white/60 text-sm">选择日期</span>
                                <div className="flex gap-2">
                                    <button onClick={() => setViewDate(new Date(year, month - 1, 1))} className="text-white/60 hover:text-white">&lt;</button>
                                    <span className="text-white text-sm">{year}年{month + 1}月</span>
                                    <button onClick={() => setViewDate(new Date(year, month + 1, 1))} className="text-white/60 hover:text-white">&gt;</button>
                                </div>
                            </div>
                            <div className="grid grid-cols-7 gap-1">
                                {['日','一','二','三','四','五','六'].map(d => <div key={d} className="text-center text-white/40 text-xs py-1">{d}</div>)}
                                {days.map((day, idx) => {
                                    if (!day) return <div key={idx} className="aspect-square"></div>;
                                    const daySlots = getDaySlots(day);
                                    const hasSlots = daySlots.length > 0;
                                    return (
                                        <button
                                            key={day}
                                            onClick={() => { setSelectedDate(day); setSelectedSlots([]); }}
                                            className={`aspect-square rounded-lg text-sm flex flex-col items-center justify-center transition-all ${
                                                selectedDate === day ? 'bg-blue-500 text-white' : hasSlots ? 'bg-green-500/20 text-green-400 border border-green-500/40' : 'bg-white/5 text-white/40'
                                            }`}
                                        >
                                            <span>{day}</span>
                                            {hasSlots && <span className="text-[8px]">{daySlots.length}个时段</span>}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                        
                        {selectedDate && (
                            <div className="mb-4">
                                <div className="flex items-center justify-between mb-2">
                                    <span className="text-white/60 text-sm">选择时间 ({month + 1}月{selectedDate}日)</span>
                                    <span className="text-blue-400 text-xs">已选{selectedSlots.length}个时段</span>
                                </div>
                                {daySlots.length > 0 ? (
                                    <div className="grid grid-cols-3 gap-2">
                                        {daySlots.map((slot, idx) => {
                                            const isSelected = selectedSlots.some(s => s.date === slot.date && s.time_slot === slot.time_slot);
                                            return (
                                                <button
                                                    key={idx}
                                                    onClick={() => toggleSlot(slot)}
                                                    className={`time-slot-btn ${isSelected ? 'multi-selected' : 'available'}`}
                                                >
                                                    {slot.time_slot}
                                                </button>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <p className="text-white/40 text-sm">该日期暂无可用时段</p>
                                )}
                            </div>
                        )}
                        
                        <button
                            onClick={handleConfirm}
                            disabled={selectedSlots.length === 0}
                            className={`w-full py-3 rounded-xl font-bold text-lg transition-all ${
                                selectedSlots.length > 0 ? 'btn-primary text-white' : 'bg-white/10 text-white/40 cursor-not-allowed'
                            }`}
                        >
                            确认预约 ({selectedSlots.length}个时段)
                        </button>
                        <button onClick={onClose} className="w-full py-3 mt-2 bg-white/5 text-white/60 rounded-xl hover:bg-white/10 transition-colors">取消</button>
                    </div>
                </div>
            );
        }
        
        function App() {
            const [isBookingOpen, setIsBookingOpen] = useState(false);
            const [selectedPrice, setSelectedPrice] = useState(null);
            const [slots, setSlots] = useState([]);
            const [status, setStatus] = useState('online');
            const [mood, setMood] = useState(mockData.player.mood);
            const [isConnected, setIsConnected] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            
            const loadData = () => {
                try {
                    const saved = localStorage.getItem('ow_booking_status');
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (data.status) setStatus(data.status);
                        if (data.mood) setMood(data.mood);
                        if (data.slots) setSlots(data.slots);
                        return true;
                    }
                } catch (e) {}
                return false;
            };
            
            useEffect(() => {
                loadData();
                setIsConnected(true);
                
                const handleStorage = (e) => {
                    if (e.key === 'ow_booking_status') {
                        setIsSyncing(true);
                        loadData();
                        setTimeout(() => setIsSyncing(false), 500);
                    }
                };
                window.addEventListener('storage', handleStorage);
                const interval = setInterval(loadData, 2000);
                
                return () => {
                    window.removeEventListener('storage', handleStorage);
                    clearInterval(interval);
                };
            }, []);
            
            const handleBook = (price) => {
                setSelectedPrice(price);
                setIsBookingOpen(true);
            };
            
            return (
                <div className="min-h-screen pb-6">
                    <SyncIndicator isConnected={isConnected} isSyncing={isSyncing} />
                    <Header mood={mood} />
                    <div className="px-4 -mt-2">
                        <StatusCard status={status} />
                        <Calendar slots={slots} />
                        <PriceList onBook={handleBook} />
                        <div className="fade-in-up delay-500">
                            <button onClick={() => setIsBookingOpen(true)} className="w-full btn-primary py-4 rounded-xl text-white font-bold text-lg">联系老板确认</button>
                        </div>
                        <div className="text-center py-6"><p className="text-white/30 text-xs">本系统仅限核心老板查看</p></div>
                    </div>
                    <BookingModal isOpen={isBookingOpen} onClose={() => setIsBookingOpen(false)} selectedPrice={selectedPrice} slots={slots} />
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
