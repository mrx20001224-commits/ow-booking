<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>守望先锋 Overwatch - 技术&娱乐陪</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #0d1117 0%, #010409 100%); min-height: 100vh; color: #fff; }
        .glass-card { background: linear-gradient(135deg, rgba(22, 27, 34, 0.9) 0%, rgba(13, 17, 23, 0.95) 100%); border: 1px solid rgba(48, 54, 61, 0.6); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-up { opacity: 0; animation: fadeInUp 0.6s ease-out forwards; }
        .delay-100 { animation-delay: 0.1s; } .delay-200 { animation-delay: 0.2s; } .delay-300 { animation-delay: 0.3s; }
        .status-card-online { background: linear-gradient(135deg, rgba(35, 197, 94, 0.15) 0%, rgba(22, 27, 34, 0.9) 100%); border: 2px solid rgba(35, 197, 94, 0.5); box-shadow: 0 0 30px rgba(35, 197, 94, 0.2); }
        .status-card-busy { background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, rgba(22, 27, 34, 0.9) 100%); border: 2px solid rgba(239, 68, 68, 0.5); box-shadow: 0 0 30px rgba(239, 68, 68, 0.2); }
        .price-tag { background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%); border: 1px solid rgba(59, 130, 246, 0.4); }
        .time-slot-btn { padding: 12px 8px; border-radius: 10px; border: 1px solid rgba(48, 54, 61, 0.6); background: rgba(22, 27, 34, 0.6); color: white; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .time-slot-btn.available { background: rgba(35, 197, 94, 0.2); border-color: rgba(35, 197, 94, 0.5); color: #4ade80; }
        .time-slot-btn.selected { background: #3b82f6; border-color: #3b82f6; color: white; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .btn-primary { background: linear-gradient(90deg, #059669 0%, #10b981 50%, #059669 100%); background-size: 200% 100%; transition: all 0.3s ease; }
        .btn-primary:hover { background-position: 100% 0; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // GitHub raw 数据 URL
        const DATA_URL = 'https://raw.githubusercontent.com/mrx20001224-commits/ow-booking/main/v2/data.json';
        
        const mockData = {
            player: { name: "微信课索", avatar: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200&h=200&fit=crop", title: "国服挑战者 / 16年入坑老登 / 5千小时+" },
            prices: [
                { id: 1, rank: "快速比赛", price: 25, icon: "⚡" },
                { id: 2, rank: "青铜白银黄金", price: 35, icon: "🥉" },
                { id: 3, rank: "角斗领域下三段", price: 45, icon: "⚔️" },
                { id: 4, rank: "白金段位", price: 55, icon: "💎" },
                { id: 5, rank: "钻石段位", price: 70, icon: "💎" },
                { id: 6, rank: "大师段位", price: 90, icon: "👑" },
            ],
            portfolio: [
                { id: 1, title: "艾什 - 好莱坞五杀", thumbnail: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400&h=300&fit=crop", videoUrl: "https://raw.githubusercontent.com/mrx20001224-commits/ow-booking/main/videos/ashe-hollywood-5k.mp4" },
                { id: 2, title: "艾什 - 中城五杀", thumbnail: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400&h=300&fit=crop", videoUrl: "https://raw.githubusercontent.com/mrx20001224-commits/ow-booking/main/videos/ashe-teamwipe-5k.mp4" },
            ],
        };
        
        function Header({ mood }) {
            return <div className="relative w-full h-48 overflow-hidden fade-in-up"><img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800&h=400&fit=crop" alt="Overwatch" className="w-full h-full object-cover" /><div className="absolute inset-0 bg-gradient-to-b from-transparent to-[#0d1117]"></div><div className="absolute bottom-4 left-4 right-4"><div className="glass-card rounded-xl p-4 flex items-center gap-3"><img src={mockData.player.avatar} alt="avatar" className="w-14 h-14 rounded-full border-2 border-blue-500/50" /><div className="flex-1"><h1 className="text-white font-bold text-lg">【守望先锋 Overwatch】</h1><p className="text-blue-400 text-sm">技术&娱乐陪 🥣</p><p className="text-white/60 text-xs mt-0.5">{mockData.player.title}</p><p className="text-green-400 text-xs">今日心情: {mood}</p></div></div></div></div>;
        }
        
        function StatusCard({ status }) {
            const isOnline = status === "online";
            return <div className={`rounded-2xl p-5 mb-4 fade-in-up delay-100 ${isOnline ? 'status-card-online' : 'status-card-busy'}`}><div className="flex items-center justify-between mb-3"><h2 className="text-white font-semibold flex items-center gap-2"><span className="w-1 h-4 bg-blue-500 rounded-full"></span>实时在线状态</h2>{isOnline && <span className="px-2 py-0.5 bg-green-500/20 text-green-400 text-xs rounded-full border border-green-500/30">秒回</span>}</div><div className="text-center py-4"><div className={`text-5xl font-bold mb-2 ${isOnline ? 'text-green-400' : 'text-red-400'}`}>{isOnline ? 'Online' : 'Busy'}</div><p className="text-white/60 text-sm">{isOnline ? '自定义后台控制，更新均实时同步' : '当前已被预约，请查看可预约时段'}</p></div></div>;
        }
        
        function Portfolio({ onPlay }) {
            return <div className="mb-4 fade-in-up delay-200"><h3 className="text-white font-semibold mb-3 flex items-center gap-2"><span className="w-1 h-4 bg-blue-500 rounded-full"></span>高光时刻 / 击杀集锦</h3><div className="grid grid-cols-2 gap-3">{mockData.portfolio.map((item) => <div key={item.id} className="relative rounded-xl overflow-hidden aspect-video bg-gray-800 cursor-pointer group" onClick={() => onPlay(item)}><img src={item.thumbnail} alt={item.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform" /><div className="absolute inset-0 bg-black/30 group-hover:bg-black/20 transition-colors"></div><div className="absolute inset-0 flex items-center justify-center"><div className="w-12 h-12 rounded-full bg-red-500/90 flex items-center justify-center group-hover:scale-110 transition-transform"><svg className="w-6 h-6 text-white ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div><div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 via-black/50 to-transparent p-2"><p className="text-white text-xs truncate">{item.title}</p></div></div>)}</div></div>;
        }
        
        function VideoModal({ isOpen, onClose, video }) {
            if (!isOpen || !video) return null;
            return <div className={`modal-overlay ${isOpen ? 'active' : ''}`} onClick={onClose}><div className="glass-card rounded-2xl p-4 max-w-lg w-full" onClick={(e) => e.stopPropagation()}><div className="flex items-center justify-between mb-3"><h3 className="text-white font-bold">{video.title}</h3><button onClick={onClose} className="text-white/60 hover:text-white text-2xl">&times;</button></div><video className="w-full rounded-lg" controls autoPlay playsInline><source src={video.videoUrl} type="video/mp4" /></video></div></div>;
        }
        
        function PriceList({ onBook }) {
            return <div className="mb-4 fade-in-up delay-300"><h3 className="text-white font-semibold mb-3 flex items-center gap-2"><span className="w-1 h-4 bg-blue-500 rounded-full"></span>预约价格表单</h3><div className="space-y-2">{mockData.prices.map((item) => <div key={item.id} className="price-tag rounded-xl p-3 flex items-center justify-between"><div className="flex items-center gap-2"><span className="text-lg">{item.icon}</span><div><span className="text-white font-medium">{item.rank}</span></div></div><div className="flex items-center gap-3"><span className="text-white font-bold">{item.price}r/h</span><button onClick={() => onBook(item)} className="px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-500/80 text-white hover:bg-blue-500 transition-all">点此预约</button></div></div>)}</div></div>;
        }
        
        function BookingModal({ isOpen, onClose, selectedPrice, slots }) {
            const [selectedSlots, setSelectedSlots] = useState([]);
            const [customerName, setCustomerName] = useState('');
            const [customerContact, setCustomerContact] = useState('');
            const [notes, setNotes] = useState('');
            
            if (!isOpen || !selectedPrice) return null;
            
            const availableSlots = slots.filter(s => s.is_available);
            const slotsByDate = availableSlots.reduce((acc, slot) => { if (!acc[slot.date]) acc[slot.date] = []; acc[slot.date].push(slot); return acc; }, {});
            
            const toggleSlot = (slot) => {
                const exists = selectedSlots.find(s => s.date === slot.date && s.time_slot === slot.time_slot);
                if (exists) setSelectedSlots(selectedSlots.filter(s => !(s.date === slot.date && s.time_slot === slot.time_slot)));
                else setSelectedSlots([...selectedSlots, slot]);
            };
            
            const handleConfirm = async () => {
                if (selectedSlots.length === 0) { alert('请至少选择一个时间段'); return; }
                if (!customerName || !customerContact) { alert('请填写姓名和联系方式'); return; }
                
                // 提交预约到 Formspree（会发送邮件通知）
                const bookingData = {
                    customer_name: customerName,
                    customer_contact: customerContact,
                    price_rank: selectedPrice.rank,
                    price_amount: selectedPrice.price,
                    slots: selectedSlots,
                    notes: notes,
                    _subject: `新预约：${customerName} - ${selectedPrice.rank}`,
                    _replyto: customerContact
                };
                
                try {
                    const response = await fetch('https://formspree.io/f/xnqevwre', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(bookingData)
                    });
                    
                    if (response.ok) {
                        const times = selectedSlots.map(s => `${s.date} ${s.time_slot}`).join(', ');
                        alert(`预约成功！\n段位：${selectedPrice.rank}\n价格：${selectedPrice.price}r/h\n时间：${times}\n\n请添加微信联系陪玩确认`);
                        onClose();
                        setSelectedSlots([]); setCustomerName(''); setCustomerContact(''); setNotes('');
                    } else {
                        alert('预约提交失败，请重试');
                    }
                } catch (e) {
                    alert('预约提交失败：' + e.message);
                }
            };
            
            return <div className={`modal-overlay ${isOpen ? 'active' : ''}`} onClick={onClose}><div className="glass-card rounded-2xl p-5 max-w-sm w-full max-h-[85vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}><h3 className="text-white text-xl font-bold mb-1">预约：{selectedPrice.rank}</h3><p className="text-blue-400 text-sm mb-4">{selectedPrice.price}r/h · 可多选时间段</p>
                <div className="mb-4 space-y-3"><input type="text" placeholder="您的称呼" value={customerName} onChange={(e) => setCustomerName(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white text-sm" /><input type="text" placeholder="微信号 / 手机号" value={customerContact} onChange={(e) => setCustomerContact(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white text-sm" /><textarea placeholder="备注（可选）" value={notes} onChange={(e) => setNotes(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-white text-sm h-20 resize-none" /></div>
                <div className="mb-4"><p className="text-white/60 text-sm mb-2">选择时间（已选{selectedSlots.length}个时段）</p>{Object.entries(slotsByDate).length === 0 ? <p className="text-white/40 text-sm">暂无可用时段</p> : Object.entries(slotsByDate).map(([date, daySlots]) => <div key={date} className="mb-3"><p className="text-white text-xs mb-1">{date}</p><div className="grid grid-cols-3 gap-2">{daySlots.map((slot, idx) => <button key={idx} onClick={() => toggleSlot(slot)} className={`time-slot-btn ${selectedSlots.find(s => s.date === slot.date && s.time_slot === slot.time_slot) ? 'selected' : 'available'}`}>{slot.time_slot}</button>)}</div></div>)}</div>
                {selectedSlots.length > 0 && <div className="mb-4 p-3 bg-white/5 rounded-xl"><p className="text-white/60 text-sm mb-2">扫码支付定金</p><img src="https://raw.githubusercontent.com/mrx20001224-commits/ow-booking/main/images/wechat-pay.jpg" alt="微信支付" className="w-32 h-32 mx-auto rounded-lg" /><p className="text-white/40 text-xs text-center mt-1">预约后请支付定金</p></div>}
                <button onClick={handleConfirm} disabled={selectedSlots.length === 0 || !customerName || !customerContact} className={`w-full py-3 rounded-xl font-bold text-lg transition-all ${selectedSlots.length > 0 && customerName && customerContact ? 'btn-primary text-white' : 'bg-white/10 text-white/40 cursor-not-allowed'}`}>确认预约 ({selectedSlots.length}个时段)</button><button onClick={onClose} className="w-full py-3 mt-2 bg-white/5 text-white/60 rounded-xl hover:bg-white/10 transition-colors">取消</button></div></div>;
        }
        
        function App() {
            const [isBookingOpen, setIsBookingOpen] = useState(false);
            const [selectedPrice, setSelectedPrice] = useState(null);
            const [playingVideo, setPlayingVideo] = useState(null);
            const [data, setData] = useState({ status: 'online', mood: '手感爆热，带飞！', slots: [], bookings: [] });
            const [isLoading, setIsLoading] = useState(true);
            
            // 从 GitHub 加载数据
            const loadData = async () => {
                try {
                    const response = await fetch(DATA_URL + '?t=' + Date.now());
                    if (response.ok) {
                        const json = await response.json();
                        setData(json);
                    }
                } catch (e) { console.error('Load error:', e); }
                setIsLoading(false);
            };
            
            useEffect(() => {
                loadData();
                const interval = setInterval(loadData, 5000); // 每5秒刷新
                return () => clearInterval(interval);
            }, []);
            
            const handleBook = (price) => { setSelectedPrice(price); setIsBookingOpen(true); };
            
            if (isLoading) return <div className="min-h-screen flex items-center justify-center text-white">加载中...</div>;
            
            return <div className="min-h-screen pb-6"><Header mood={data.mood} /><div className="px-4 -mt-2"><StatusCard status={data.status} /><Portfolio onPlay={setPlayingVideo} /><PriceList onBook={handleBook} /><div className="text-center py-6"><p className="text-white/30 text-xs">本系统仅限核心老板查看</p></div></div><BookingModal isOpen={isBookingOpen} onClose={() => setIsBookingOpen(false)} selectedPrice={selectedPrice} slots={data.slots} /><VideoModal isOpen={!!playingVideo} onClose={() => setPlayingVideo(null)} video={playingVideo} /></div>;
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
